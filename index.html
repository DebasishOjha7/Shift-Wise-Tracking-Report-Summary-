<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIFT WISE TRACKING REPORT SUMMARY</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    font-family: Calibri, Arial, sans-serif;
    background:white;
    margin:0;
    padding:20px;
    color:black;
}

.sheet{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    font-weight:bold;
    font-size:18px;
    background:#1f4e79; /* Cool Professional Blue */
    color:white;
    padding:8px;
    border:1px solid #1f4e79;
    letter-spacing:0.5px;
}

.sub-info{
    text-align:center;
    margin-top:6px;
    font-size:14px;
}

.controls{
    margin:15px 0;
}

button{
    padding:5px 12px;
    font-size:13px;
    cursor:pointer;
}

.date-table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}

.date-table td{
    border:1px solid black;
    padding:6px;
    font-size:14px;
}

.date-title{
    font-weight:bold;
    background:#e9eff5;
}

.total{
    font-weight:bold;
}

.breakdown{
    background:#ffcccc;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="sheet" id="reportArea">

<div class="header">
SHIFT WISE TRACKING REPORT SUMMARY
</div>

<div class="sub-info" id="currentInfo"></div>

<div class="controls" id="controlPanel">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <button onclick="downloadJPG()">Save as JPG</button>
</div>

<div id="output"></div>

</div>

<script>

// SHIFT AUTO DETECT
function getShift(){
    let hour = new Date().getHours();
    if(hour >= 6 && hour < 14) return "A";
    if(hour >= 14 && hour < 22) return "B";
    return "C";
}

function formatDate(date){
    return date.toLocaleDateString('en-GB');
}

document.getElementById("currentInfo").innerHTML =
    "Date: " + formatDate(new Date()) + " | Shift: " + getShift();


// FILE READ
document.getElementById('fileInput').addEventListener('change', function(e) {

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, {raw:false});
        generateReport(json);
    };

    reader.readAsArrayBuffer(file);
});


// GENERATE REPORT
function generateReport(data){

    let grouped = {};

    data.forEach(row=>{
        let tripDate = row["Trip Date"];
        if(!tripDate) return;

        tripDate = tripDate.toString().trim();

        if(!grouped[tripDate]){
            grouped[tripDate] = [];
        }

        grouped[tripDate].push(row);
    });

    let output = document.getElementById("output");
    output.innerHTML = "";

    Object.keys(grouped).forEach(date=>{

        let rows = grouped[date];
        let remarksCount = {};

        rows.forEach(row=>{
            let remarks = row["REMARKS"] 
                ? row["REMARKS"].toString().trim() 
                : "BLANK";

            remarksCount[remarks] = (remarksCount[remarks] || 0) + 1;
        });

        let table = document.createElement("table");
        table.className = "date-table";

        let rowsHTML = `
            <tr class="date-title">
                <td colspan="2">Trip Date - ${date}</td>
            </tr>
            <tr>
                <td class="total" colspan="2">TOTAL TRANSIT - ${rows.length}</td>
            </tr>
        `;

        Object.entries(remarksCount)
            .sort((a,b)=>b[1]-a[1])
            .forEach(([remark,count])=>{

                if(remark.toUpperCase().includes("BREAKDOWN")){
                    rowsHTML += `<tr class="breakdown">
                                    <td>${remark}</td>
                                    <td>${count}</td>
                                 </tr>`;
                } else {
                    rowsHTML += `<tr>
                                    <td>${remark}</td>
                                    <td>${count}</td>
                                 </tr>`;
                }
            });

        table.innerHTML = rowsHTML;
        output.appendChild(table);
    });
}


// EXPORT JPG (NO BLANK SPACE)
function downloadJPG(){

    let controls = document.getElementById("controlPanel");
    controls.style.display = "none";

    let report = document.getElementById("reportArea");
    let output = document.getElementById("output");

    let height = output.scrollHeight + 130;

    html2canvas(report, {
        scale:3,
        backgroundColor:"#ffffff",
        height: height,
        windowHeight: height
    }).then(canvas=>{

        let link = document.createElement("a");
        link.download = "Shift_Report.jpg";
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.click();

        controls.style.display = "block";
    });
}

</script>

</body>
</html>
